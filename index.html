<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>My Portfolio</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet"/>
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet"/>

<script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>

<style>
    body {
    font-family: 'Poppins', sans-serif;
    margin: 0;
    height: 100vh;
   
    }

    .bg-image {
        background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)), url('bg.jpg') no-repeat center center/cover;
        height: 100vh;
    }

    .icon-dock {
    position: fixed;
    top: 20px;
    left: 50%;
    transform: translateX(-50%);
    background: rgba(255, 255, 255, 0.1);
    backdrop-filter: blur(10px);
    border-radius: 2rem;
    padding: 0.5rem 1rem;
    display: flex;
    gap: 100px;
    }

    .icon-dock a {
    color: #fff;
    font-size: 1.5rem;
    transition: all 0.3s ease;
    }

    .icon-dock a:hover {
    color: #ffc107;
    transform: scale(1.25);
    }

    .bounce {
        animation: bounce 1s infinite;
    }

    @keyframes bounce {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-10px); }
    }
</style>
</head>
<body>
<div id="app">
    <div class="bg-image d-flex flex-column">

        <div class="icon-dock">
        <a href="mailto:sachinimmanuel2006@gmail.com" title="Email"><i class="fas fa-envelope"></i></a>
        <a href="tel:+916380734733" title="Call"><i class="fas fa-phone"></i></a>
        <a href="https://www.linkedin.com/in/sachin-immanuel-leo-s-654244210/" target="_blank" title="LinkedIn"><i class="fab fa-linkedin"></i></a>
        <a href="https://github.com/sachinle?tab=repositories" target="_blank" title="GitHub"><i class="fab fa-github"></i></a>
        <a href="Sachin Leo Resume.pdf" download title="Download Resume"><i class="fas fa-file-alt"></i></a>
        </div>


        <div class="text-white text-center flex-grow-1 d-flex flex-column justify-content-center align-items-center">
        <div v-for="content in contents" :key="content.id">
            <h1 class="fw-bold display-4">{{ content.title1 }}</h1>
            <h3 class="fw-light">{{ content.title2 }}</h3>
        </div>
        <a href="about.html" 
            class="btn btn-warning rounded-circle mt-4 d-flex justify-content-center align-items-center bounce shadow"
            style="width: 60px; height: 60px;">
            <i class="bi bi-arrow-right fs-4 text-dark"></i>
        </a>
        </div>
    </div>
</div>

<script>
    const { createApp } = Vue;
    createApp({
        data() {
        return {
            contents: [
                { id: 1, title1: "Hi, I'm Sachin Leo", title2: "Front End Developer" }
            ]
        };
        }
    }).mount('#app');
</script>
</body>
</html>
