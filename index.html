<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>My Portfolio</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet"/>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet"/>
  <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>

  <style>
    body {
      font-family: 'Poppins', sans-serif;
      margin: 0;
    }

    .bg-image {
      background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), url('bg.jpg') no-repeat center center;
      background-size: cover;
    }

    .bounce {
      animation: bounce 1s infinite;
    }

    @keyframes bounce {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-10px); }
    }
  </style>
</head>
<body>
  <div id="app">
    <!-- Background Section -->
    <div class="bg-image vh-100 d-flex flex-column">

      <!-- Icon Dock -->
      <div class="d-flex justify-content-center gap-4 flex-wrap py-3 position-fixed top-0 start-50 translate-middle-x bg-opacity-25 bg-white rounded-pill shadow px-3 mt-2 z-3">
        <a href="mailto:sachinimmanuel2006@gmail.com" title="Email" class="text-white fs-4"><i class="fas fa-envelope"></i></a>
        <a href="tel:+916380734733" title="Call" class="text-white fs-4"><i class="fas fa-phone"></i></a>
        <a href="https://www.linkedin.com/in/sachin-immanuel-leo-s-654244210/" target="_blank" title="LinkedIn" class="text-white fs-4"><i class="fab fa-linkedin"></i></a>
        <a href="https://github.com/sachinle?tab=repositories" target="_blank" title="GitHub" class="text-white fs-4"><i class="fab fa-github"></i></a>
        <a href="Sachin Leo Resume.pdf" download title="Download Resume" class="text-white fs-4"><i class="fas fa-file-alt"></i></a>
      </div>

      <!-- Center Content -->
      <div class="text-white text-center d-flex flex-column justify-content-center align-items-center flex-grow-1 px-3">
        <div v-for="content in contents" :key="content.id">
          <h1 class="fw-bold display-4">{{ content.title1 }}</h1>
          <h3 class="fw-light">{{ content.title2 }}</h3>
        </div>
        <a href="about.html" 
          class="btn btn-warning rounded-circle mt-4 d-flex justify-content-center align-items-center bounce shadow"
          style="width: 60px; height: 60px;">
          <i class="bi bi-arrow-right fs-4 text-dark"></i>
        </a>
      </div>
    </div>
  </div>

  <script>
    const { createApp } = Vue;
    createApp({
      data() {
        return {
          contents: [
            { id: 1, title1: "Hi, I'm Sachin Leo", title2: "Front End Developer" }
          ]
        };
      }
    }).mount('#app');
  </script>
</body>
</html>
